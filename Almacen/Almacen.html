<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Súper Marian - Almacén Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8f9fa; }
        header { background: #1a73e8; color: white; padding: 15px; text-align: center; font-size: 20px; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .form-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        
        #secuencialProd { background-color: #f1f3f4; color: #1a73e8; font-weight: bold; border: 2px solid #dee2e6; cursor: not-allowed; }
        
        .btn-add { background: #34a853; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn-update { background: #f39c12; color: white; display: none; }
        .btn-delete { background: #d93025; color: white; display: none; margin-top: 5px; }
        .btn-scan { background: #1a73e8; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f4; }
        tr:hover { background: #f1f8ff; cursor: pointer; }
        .id-db { font-family: monospace; font-weight: bold; color: #1a73e8; background: #e8f0fe; padding: 4px; border-radius: 4px; }
        #reader { width: 100%; max-width: 400px; margin: auto; }
        .info-tag { font-size: 0.8rem; color: #666; margin-top: 5px; display: block; }
        
    </style>
</head>
<body>

<header>📦 Control de Inventario - Súper Marian</header>

<div class="container">
    <button style="background:#666; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin-bottom:20px;" onclick="location.href='index.html'">⬅ Volver</button>

    <div class="form-card">
        <h3 id="formTitulo">+ Registrar Nuevo Producto</h3>
        <div id="reader"></div>
        <button class="btn-scan" onclick="iniciarEscaner()">📷 Escanear Código</button>

        <div class="grid-inputs">
            <input type="hidden" id="editId">
            <div>
                <label><small>ID Producto (7 dígitos):</small></label>
                <input type="text" id="secuencialProd" readonly>
            </div>
            <div><label><small>Código de Barras:</small></label><input type="text" id="codBarra" placeholder="Escanear..."></div>
            <div><label><small>Nombre del Producto:</small></label><input type="text" id="nomProd"></div>
            <div><label><small>Precio RD$:</small></label><input type="number" id="preProd"></div>
            <div><label><small>Stock:</small></label><input type="number" id="stockProd"></div>
        </div>
        <div>

               <label><small>Estatus:</small></label>
          <select id="estatusProd" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; font-size: 1rem;">
               <option value="ACTIVO">✅ ACTIVO</option>
               <option value="INACTIVO">❌ INACTIVO</option>
           </select>
         </div>
        
        <button class="btn-add" id="btnGuardar">Guardar Nuevo Producto</button>
        <button class="btn-add btn-update" id="btnActualizar" onclick="window.actualizarProducto()">✅ Confirmar Cambios</button>
        
       <button id="btnCancelar" style="display:none; width:100%; margin-top:5px; padding:12px; border-radius:8px; border:none; background:#eee; cursor:pointer; font-weight:bold;" onclick="window.cancelarEdicion()">⬅ Volver / Cancelar</button>
    </div>

    <div class="form-card">
        <input type="text" id="busqueda" style="width:100%; padding:10px; border-radius:8px; border:2px solid #1a73e8;"  placeholder="🔍 Escribe y presiona Enter para buscar..." onkeydown="if(event.key === 'Enter') window.ejecutarBusqueda()">
        <span id="txtInfo" class="info-tag"></span>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo"></tbody>
        </table>
    </div>
</div>

<script type="module" src="almacen.js"></script>

</body>
</html>
