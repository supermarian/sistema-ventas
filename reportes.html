<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Súper Marian - Reportes de Ventas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        header { background: #6f42c1; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .stat-card h3 { margin: 0; color: #666; font-size: 16px; }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #6f42c1; }
        .table-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #555; }
        .btn-volver { background: #666; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .badge { background: #e8f0fe; color: #1a73e8; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<header>📈 Reportes de Ventas - Súper Marian</header>

<div class="container">
    <button class="btn-volver" onclick="location.href='menu.html'">⬅ Volver al Menú</button>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Ventas Totales</h3>
            <p id="totalHistorico">RD$ 0</p>
        </div>
        <div class="stat-card">
            <h3>Tickets Emitidos</h3>
            <p id="cantidadVentas">0</p>
        </div>
        <div class="stat-card">
            <h3>Promedio por Venta</h3>
            <p id="promedioVenta">RD$ 0</p>
        </div>
    </div>

    <div class="table-card">
        <h3>📄 Historial de Ventas</h3>
        <table>
            <thead>
                <tr>
                    <th>Fecha y Hora</th>
                    <th>Productos Vendidos</th>
                    <th>Total Cobrado</th>
                </tr>
            </thead>
            <tbody id="tablaReportes">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAy4En1r4frGng-tWFtA68FGLf0vupJ0AY",
        authDomain: "supermercado-marian.firebaseapp.com",
        projectId: "supermercado-marian",
        storageBucket: "supermercado-marian.firebasestorage.app",
        messagingSenderId: "627337795444",
        appId: "1:627337795444:web:e9a4cb48ff164b78477e21"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ESCUCHAR LAS VENTAS EN TIEMPO REAL
    const q = query(collection(db, "ventas_realizadas"), orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const tabla = document.getElementById('tablaReportes');
        let sumaTotal = 0;
        let contador = 0;
        tabla.innerHTML = '';

        snapshot.forEach((doc) => {
            const venta = doc.data();
            sumaTotal += venta.total;
            contador++;

            // Crear lista de productos para la tabla
            const listaProd = venta.productos.map(p => `${p.cantidad}x ${p.nombre}`).join(', ');

            tabla.innerHTML += `
                <tr>
                    <td>${venta.fecha}</td>
                    <td><span class="badge">${listaProd}</span></td>
                    <td><strong>RD$ ${venta.total.toLocaleString()}</strong></td>
                </tr>
            `;
        });

        // Actualizar tarjetas de arriba
        document.getElementById('totalHistorico').innerText = `RD$ ${sumaTotal.toLocaleString()}`;
        document.getElementById('cantidadVentas').innerText = contador;
        document.getElementById('promedioVenta').innerText = contador > 0 ? `RD$ ${(sumaTotal / contador).toFixed(2)}` : "RD$ 0";
    });
</script>
</body>
</html>
