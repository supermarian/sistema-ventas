<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Súper Marian - Almacén Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8f9fa; }
        header { background: #1a73e8; color: white; padding: 15px; text-align: center; font-size: 20px; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .form-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        
        #secuencialProd { background-color: #f1f3f4; color: #1a73e8; font-weight: bold; border: 2px solid #dee2e6; cursor: not-allowed; }
        
        .btn-add { background: #34a853; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn-update { background: #f39c12; color: white; display: none; }
        .btn-delete { background: #d93025; color: white; display: none; margin-top: 5px; }
        .btn-scan { background: #1a73e8; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f4; }
        tr:hover { background: #f1f8ff; cursor: pointer; }
        .id-db { font-family: monospace; font-weight: bold; color: #1a73e8; background: #e8f0fe; padding: 4px; border-radius: 4px; }
        #reader { width: 100%; max-width: 400px; margin: auto; }
        .info-tag { font-size: 0.8rem; color: #666; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<header>📦 Control de Inventario - Súper Marian</header>

<div class="container">
    <button style="background:#666; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin-bottom:20px;" onclick="location.href='index.html'">⬅ Volver</button>

    <div class="form-card">
        <h3 id="formTitulo">+ Registrar Nuevo Producto</h3>
        <div id="reader"></div>
        <button class="btn-scan" onclick="iniciarEscaner()">📷 Escanear Código</button>

        <div class="grid-inputs">
            <input type="hidden" id="editId">
            <div>
                <label><small>ID Producto (7 dígitos):</small></label>
                <input type="text" id="secuencialProd" readonly>
            </div>
            <div><label><small>Código de Barras:</small></label><input type="text" id="codBarra" placeholder="Escanear..."></div>
            <div><label><small>Nombre del Producto:</small></label><input type="text" id="nomProd"></div>
            <div><label><small>Precio RD$:</small></label><input type="number" id="preProd"></div>
            <div><label><small>Stock:</small></label><input type="number" id="stockProd"></div>
        </div>
        
        <button class="btn-add" id="btnGuardar">Guardar Nuevo Producto</button>
        <button class="btn-add btn-update" id="btnActualizar" onclick="actualizarProducto()">✅ Confirmar Cambios</button>
        <button class="btn-add btn-delete" id="btnEliminar" onclick="eliminarProducto()">🗑️ Eliminar Producto</button>
        <button id="btnCancelar" style="display:none; width:100%; margin-top:5px; padding:10px; border-radius:8px; border:none; cursor:pointer;" onclick="cancelarEdicion()">Cancelar</button>
    </div>

    <div class="form-card">
        <input type="text" id="busqueda" style="width:100%; padding:10px; border-radius:8px; border:2px solid #1a73e8;" placeholder="🔍 Buscar por nombre, código o ID..." onkeyup="renderizarTabla()">
        <span id="txtInfo" class="info-tag"></span>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAy4En1r4frGng-tWFtA68FGLf0vupJ0AY",
        authDomain: "supermercado-marian.firebaseapp.com",
        projectId: "supermercado-marian",
        storageBucket: "supermercado-marian.firebasestorage.app",
        messagingSenderId: "627337795444",
        appId: "1:627337795444:web:e9a4cb48ff164b78477e21"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let productosCache = [];

    // --- ESCUCHAR DATOS ---
    onSnapshot(collection(db, "productos"), (snap) => {
        productosCache = [];
        let maxVal = 0;
        snap.forEach(d => {
            const data = { idDoc: d.id, ...d.data() };
            productosCache.push(data);
            const num = parseInt(data.idSecuencial);
            if(num > maxVal) maxVal = num;
        });
        
        // Actualizar ID Siguiente (7 dígitos)
        document.getElementById('secuencialProd').value = (maxVal + 1).toString().padStart(7, '0');
        renderizarTabla();
    });

    // --- FUNCIÓN PARA MOSTRAR LA TABLA (MÁXIMO 10 O BÚSQUEDA) ---
    window.renderizarTabla = () => {
        const busq = document.getElementById('busqueda').value.toLowerCase();
        const cuerpo = document.getElementById('tablaCuerpo');
        const info = document.getElementById('txtInfo');
        cuerpo.innerHTML = "";

        let listaFinal = [];

        if (busq === "") {
            // Si no hay búsqueda, ordenamos por ID más reciente y tomamos solo 10
            listaFinal = [...productosCache]
                .sort((a, b) => parseInt(b.idSecuencial) - parseInt(a.idSecuencial))
                .slice(0, 10);
            info.innerText = "📌 Mostrando los 10 más recientes.";
        } else {
            // Si hay búsqueda, filtramos y mostramos todo lo que coincida
            listaFinal = productosCache.filter(p => 
                p.nombre.toLowerCase().includes(busq) || 
                p.codigo.toLowerCase().includes(busq) || 
                p.idSecuencial.includes(busq)
            ).sort((a, b) => parseInt(a.idSecuencial) - parseInt(b.idSecuencial));
            info.innerText = `🔍 Encontrados: ${listaFinal.length}`;
        }

        listaFinal.forEach(p => {
            cuerpo.innerHTML += `
                <tr onclick="cargarEdicion('${p.idDoc}','${p.idSecuencial}','${p.codigo}','${p.nombre}',${p.precio},${p.stock})">
                    <td><span class="id-db">${p.idSecuencial}</span></td>
                    <td>${p.codigo}</td>
                    <td><b>${p.nombre}</b></td>
                    <td>RD$ ${p.precio}</td>
                    <td>${p.stock}</td>
                </tr>`;
        });
    };

    // --- GUARDAR ---
    document.getElementById('btnGuardar').onclick = async () => {
        const nombre = document.getElementById('nomProd').value.trim();
        if(!nombre) return alert("Nombre obligatorio");
        await addDoc(collection(db, "productos"), {
            idSecuencial: document.getElementById('secuencialProd').value,
            codigo: document.getElementById('codBarra').value || "S/C",
            nombre: nombre,
            precio: Number(document.getElementById('preProd').value) || 0,
            stock: Number(document.getElementById('stockProd').value) || 0,
            timestamp: Date.now()
        });
        alert("¡Guardado!");
        limpiarForm();
    };

    // --- EDITAR ---
    window.cargarEdicion = (id, idSec, cod, nom, pre, sto) => {
        document.getElementById('editId').value = id;
        document.getElementById('secuencialProd').value = idSec;
        document.getElementById('codBarra').value = cod;
        document.getElementById('nomProd').value = nom;
        document.getElementById('preProd').value = pre;
        document.getElementById('stockProd').value = sto;
        
        document.getElementById('formTitulo').innerText = "📝 Editando Producto";
        document.getElementById('btnGuardar').style.display = "none";
        document.getElementById('btnActualizar').style.display = "block";
        document.getElementById('btnEliminar').style.display = "block";
        document.getElementById('btnCancelar').style.display = "block";
        window.scrollTo(0,0);
    };

    window.actualizarProducto = async () => {
        await updateDoc(doc(db, "productos", document.getElementById('editId').value), {
            codigo: document.getElementById('codBarra').value,
            nombre: document.getElementById('nomProd').value,
            precio: Number(document.getElementById('preProd').value),
            stock: Number(document.getElementById('stockProd').value)
        });
        alert("¡Actualizado!");
        cancelarEdicion();
    };

    window.eliminarProducto = async () => {
        if(confirm("¿Eliminar este producto?")) {
            await deleteDoc(doc(db, "productos", document.getElementById('editId').value));
            alert("Eliminado.");
            cancelarEdicion();
        }
    };

    window.cancelarEdicion = () => {
        limpiarForm();
        document.getElementById('formTitulo').innerText = "+ Registrar Nuevo Producto";
        document.getElementById('btnGuardar').style.display = "block";
        document.getElementById('btnActualizar').style.display = "none";
        document.getElementById('btnEliminar').style.display = "none";
        document.getElementById('btnCancelar').style.display = "none";
    };

    function limpiarForm() {
        document.getElementById('codBarra').value = "";
        document.getElementById('nomProd').value = "";
        document.getElementById('preProd').value = "";
        document.getElementById('stockProd').value = "";
    }
</script>
</body>
</html>
